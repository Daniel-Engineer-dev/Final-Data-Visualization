services:
  backend:
    build:
      context: ..
      dockerfile: application/infra/backend.Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - ../data:/workspace/data

  frontend:
    build:
      context: ..
      dockerfile: application/infra/frontend.Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
