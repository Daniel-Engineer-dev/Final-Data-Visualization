services:
  backend:
    build:
      context: ..
      dockerfile: application/infra/backend.Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - ../data:/workspace/data
      # Mount mã nguồn để sửa code không cần build lại image
      - ./backend/app:/workspace/application/backend/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ..
      dockerfile: application/infra/frontend.Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      # Mount source + giữ node_modules trong container (anonymous volume)
      - ./frontend:/workspace/application/frontend
      - /workspace/application/frontend/node_modules
    depends_on:
      - backend
